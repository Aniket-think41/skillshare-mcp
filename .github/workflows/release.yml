name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-amd64
          - os: macos-latest
            target: macos-arm64
          - os: windows-latest
            target: windows-amd64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          # MCP depends on skillshare-cli for shared auth/local-scan. It is not on
          # PyPI, so install it from its GitHub repo (keeps CI self-contained).
          pip install "skillshare-cli @ git+https://github.com/Aniket-think41/skillshare-cli.git"
          pip install -e .

      # Build from the top-level run.py shim (NOT skillshare_mcp/server.py) so the
      # whole package is bundled and imports resolve. --collect-all mcp pulls in the
      # MCP framework's dynamically-imported submodules + data files (missed under
      # --onefile otherwise); --collect-submodules covers our two packages.
      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --name skillshare-mcp \
            --collect-all mcp \
            --collect-submodules skillshare_mcp \
            --collect-submodules skillshare_cli \
            --collect-submodules truststore \
            run.py
          if [ "${{ matrix.target }}" = "windows-amd64" ]; then
            mv dist/skillshare-mcp.exe dist/skillshare-mcp-windows-amd64.exe
          else
            mv dist/skillshare-mcp dist/skillshare-mcp-${{ matrix.target }}
          fi
        shell: bash

      - name: Smoke-test the binary
        run: |
          if [ "${{ matrix.target }}" = "windows-amd64" ]; then
            ./dist/skillshare-mcp-windows-amd64.exe --version
          else
            ./dist/skillshare-mcp-${{ matrix.target }} --version
          fi
        shell: bash

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: skillshare-mcp-${{ matrix.target }}
          path: dist/skillshare-mcp-*

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: skillshare-mcp-*
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
